<head>
  <meta charset="UTF-8" />

  <!-- Offline-first: solo recursos locales en el boot. Los meta tags de SEO (canonical, og:url, og:image, twitter:image, JSON-LD)
       se inyectan en runtime SOLO para el host web (Vercel/onniverso.com), no para el WebView de Capacitor. -->
  <link rel="icon" type="image/png" sizes="32x32" href="/imagenes/favicon.png?v=20260527">
  <link rel="shortcut icon" href="/imagenes/favicon.png?v=20260527">
  <link rel="apple-touch-icon" href="/imagenes/favicon.png?v=20260527">
  <meta property="og:title" content="OnniVers · Tu Realidad Evolucionada">
  <meta property="og:description" content="OnniVers: realidad inmersiva, eventos VR y transmisiones en vivo en 360°. Plataforma líder en educación inmersiva, tiendas digitales y conciertos en realidad aumentada. Empresa Tecnológica de Colombia S.A.S.">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="es_ES">
  <meta property="og:site_name" content="OnniVers">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="OnniVers · Tu Realidad Evolucionada">
  <meta name="twitter:description" content="OnniVers: realidad inmersiva, eventos VR y transmisiones en vivo en 360°. Plataforma líder en educación inmersiva, tiendas digitales y conciertos en realidad aumentada. Empresa Tecnológica de Colombia S.A.S.">
</head>

<body>
  <script>
    (function blockVercelToolbar() {
      var BLOCK = "vercel.live";
      function sweep() {
        try {
          document
            .querySelectorAll(
              'script[src*="' + BLOCK + '"], iframe[src*="' + BLOCK + '"], link[href*="' + BLOCK + '"]',
            )
            .forEach(function (node) {
              node.remove();
            });
          document.querySelectorAll("button, [role='button']").forEach(function (el) {
            var label = (el.textContent || "").trim();
            if (label !== "Interaction Timing" && label.indexOf("Interaction Timing") !== 0) return;
            var host = el;
            for (var i = 0; i < 10 && host.parentElement; i++) {
              host = host.parentElement;
              var pos = window.getComputedStyle(host).position;
              if (pos === "fixed" || pos === "sticky" || host.id === "vercel-toolbar") {
                host.remove();
                return;
              }
            }
            el.remove();
          });
        } catch (_) {}
      }
      sweep();
      new MutationObserver(sweep).observe(document.documentElement, {
        childList: true,
        subtree: true,
      });
    })();
  </script>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    (function injectSeoForWebHost(){
      try {
        var host = (window.location && window.location.hostname || "").toLowerCase();
        if (host !== "onniverso.com" && host !== "www.onniverso.com") return;
        var canonical = document.createElement("link");
        canonical.rel = "canonical";
        canonical.href = "https://onniverso.com/";
        document.head.appendChild(canonical);
        var ogUrl = document.createElement("meta");
        ogUrl.setAttribute("property", "og:url");
        ogUrl.content = "https://onniverso.com/";
        document.head.appendChild(ogUrl);
        var robots = document.createElement("meta");
        robots.name = "robots";
        robots.content = "index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1";
        document.head.appendChild(robots);
        var ld = document.createElement("script");
        ld.type = "application/ld+json";
        ld.textContent = '{"@context":"https://schema.org","@type":"WebSite","name":"OnniVers","url":"https://onniverso.com/","description":"OnniVers: realidad inmersiva, eventos VR y transmisiones en vivo en 360°. Plataforma líder en educación inmersiva, tiendas digitales y conciertos en realidad aumentada. Empresa Tecnológica de Colombia S.A.S.","inLanguage":"es"}';
        document.head.appendChild(ld);
      } catch (_) { /* offline / restricted host: no SEO injection */ }
    })();
  </script>
</body>

</html>
