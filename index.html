<body>
  <script>
    (function blockVercelToolbar() {
      var BLOCK = "vercel.live";
      function sweep() {
        try {
          document
            .querySelectorAll(
              'script[src*="' + BLOCK + '"], iframe[src*="' + BLOCK + '"], link[href*="' + BLOCK + '"]',
            )
            .forEach(function (node) {
              node.remove();
            });
          document.querySelectorAll("button, [role='button']").forEach(function (el) {
            var label = (el.textContent || "").trim();
            if (label !== "Interaction Timing" && label.indexOf("Interaction Timing") !== 0) return;
            var host = el;
            for (var i = 0; i < 10 && host.parentElement; i++) {
              host = host.parentElement;
              var pos = window.getComputedStyle(host).position;
              if (pos === "fixed" || pos === "sticky" || host.id === "vercel-toolbar") {
                host.remove();
                return;
              }
            }
            el.remove();
          });
        } catch (_) {}
      }
      sweep();
      new MutationObserver(sweep).observe(document.documentElement, {
        childList: true,
        subtree: true,
      });
    })();
  </script>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    (function injectSeoForWebHost(){
      try {
        var host = (window.location && window.location.hostname || "").toLowerCase();
        var isProductionWeb =
          host === "onnivers.online" || host === "www.onnivers.online";
        if (!isProductionWeb) return;
        var siteOrigin = "https://onnivers.online";
        var canonical = document.querySelector('link[rel="canonical"]');
        if (canonical) canonical.setAttribute("href", siteOrigin + "/");
        else {
          var link = document.createElement("link");
          link.rel = "canonical";
          link.href = siteOrigin + "/";
          document.head.appendChild(link);
        }
        var ogUrl = document.querySelector('meta[property="og:url"]');
        if (ogUrl) ogUrl.setAttribute("content", siteOrigin + "/");
        else {
          var meta = document.createElement("meta");
          meta.setAttribute("property", "og:url");
          meta.content = siteOrigin + "/";
          document.head.appendChild(meta);
        }
        var robots = document.querySelector('meta[name="robots"]');
        if (robots) {
          robots.setAttribute("content", "index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1");
        } else {
          var robotsMeta = document.createElement("meta");
          robotsMeta.name = "robots";
          robotsMeta.content = "index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1";
          document.head.appendChild(robotsMeta);
        }
        if (document.getElementById("schema-org-website")) return;
        var ld = document.createElement("script");
        ld.type = "application/ld+json";
        ld.id = "schema-org-website";
        ld.textContent = '{"@context":"https://schema.org","@type":"WebSite","name":"OnniVers","url":"' + siteOrigin + '/","description":"OnniVers: realidad inmersiva, eventos VR y transmisiones en vivo en 360°. Plataforma líder en educación inmersiva, tiendas digitales y conciertos en realidad aumentada. Empresa Tecnológica de Colombia S.A.S.","inLanguage":"es"}';
        document.head.appendChild(ld);
      } catch (_) { /* offline / restricted host */ }
    })();
  </script>
</body>
