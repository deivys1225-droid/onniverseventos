apply plugin: 'com.android.application'

// La UI web no se edita en src/main/assets/public/ — viene de `vite build` + `npx cap sync android`
// (desde la raíz del repo). Cursor/Android Studio solo muestran esa copia embebida.

android {
    namespace = "com.vivevr.app"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.vivevr.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 6
        versionName "1.0.6"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    // ----- LIBS LOCALES (JAR + AAR) -----
    // Carga TODO lo que pongas en `android/app/libs/`. Esto cubre:
    //   - .jar de SDKs cerrados/legacy.
    //   - .aar nativos (Google Cardboard SDK open-source, etc.) bajados a mano.
    // No requiere acceso a internet: Gradle lo lee del filesystem gracias al
    // `flatDir { dirs 'libs' }` declarado arriba en `repositories`.
    //
    // El `*.aar` queda integrado al APK con su AndroidManifest, recursos y
    // bibliotecas nativas (libgvr.so / libcardboard_jni.so) sin tener que
    // tocar nada más en este build.gradle.
    implementation fileTree(include: ['*.jar', '*.aar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    // Lobby Pantalla 1: recorrido del árbol SAF (ACTION_OPEN_DOCUMENT_TREE) para reproductor MP3/MP4.
    implementation "androidx.documentfile:documentfile:1.0.1"
    implementation "com.google.android.material:material:1.12.0"
    implementation "androidx.media3:media3-exoplayer:1.5.1"
    implementation "androidx.media3:media3-exoplayer-hls:1.5.1"
    implementation "androidx.media3:media3-ui:1.5.1"
    implementation "com.github.pedroSG94.rtmp-rtsp-stream-client-java:rtplibrary:2.4.4"
    // -----------------------------------------------------------------
    // Google Cardboard SDK (open-source, sucesor de com.google.vr:sdk-base):
    //   - Repo:     https://github.com/googlevr/cardboard
    //   - Releases: https://github.com/googlevr/cardboard/releases
    //
    // Para integrarlo manualmente (sin Maven, sin red):
    //   1. Descargar el .aar desde Releases (ej. `sdk-1.24.0.aar`).
    //   2. Copiarlo a `android/app/libs/` con el nombre que quieras
    //      (ej. `cardboard-sdk.aar`).
    //   3. Sync de Gradle. El fileTree de arriba lo recoge automáticamente
    //      y expone clases como `com.google.cardboard.sdk.*` (head tracking,
    //      stereo renderer, lens distortion, QR pairing).
    // -----------------------------------------------------------------
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}

// Copia siempre capacitor.config.json de la raíz del repo (webDir="dist") a assets/, así
// Android Studio sin "npx cap copy" mantiene androidScheme y allowNavigation sincronizados.
def rootCapacitorConfig = file("${rootProject.projectDir}/../capacitor.config.json")
def assetsCapacitorConfig = file("${projectDir}/src/main/assets/capacitor.config.json")

tasks.register("copyRootCapacitorConfig") {
    group = "capacitor"
    description = "Copia capacitor.config.json desde la raíz del proyecto a app/src/main/assets/"
    onlyIf { rootCapacitorConfig.exists() }
    doLast {
        assetsCapacitorConfig.parentFile.mkdirs()
        java.nio.file.Files.copy(
            rootCapacitorConfig.toPath(),
            assetsCapacitorConfig.toPath(),
            java.nio.file.StandardCopyOption.REPLACE_EXISTING
        )
    }
}

afterEvaluate {
    tasks.named("preBuild").configure { dependsOn("copyRootCapacitorConfig") }
}
